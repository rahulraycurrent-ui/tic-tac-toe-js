<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tic-toc-toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="message-container hide">
    <p id="msg">winner</p>
    <button id="newgame-btn">new game</button>
  </div>
        <h1>tic-toc-toe</h1>
        <div class="controls">
  <button id="friend">Play with Friend</button>
  <button id="computer">Play with Computer</button>

  <div id="difficulty-box" class="hide">
    <button data-level="easy">Easy</button>
    <button data-level="medium">Medium</button>
    <button data-level="hard">Hard</button>
  </div>
</div>
  <div class="container">
<div id="symbol-box" class="hide">
  <button data-symbol="X">Play as X</button>
  <button data-symbol="O">Play as O</button>
</div>
    <div class="game">
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>

    </div>

  </div>
  <button id="reset">reset game</button>
<script src="script.js"></script>    
</body>
            </html>
